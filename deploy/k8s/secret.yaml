apiVersion: v1
kind: Secret
metadata:
  name: sidecar-secret
type: Opaque
stringData:
  bearer: "REPLACE_ME"
---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-claude-auth
type: Opaque
# How to populate this Secret:
#
#   1. On a host with a browser and an active Claude subscription
#      (Pro / Max / Team / Enterprise), install the CLI:
#         npm install -g @anthropic-ai/claude-code
#   2. Generate a long-lived (1 year) OAuth token:
#         claude setup-token
#      The command walks through browser OAuth and prints the token to
#      stdout. The CLI does NOT save it — copy it now.
#   3. Replace this manifest with one created from that token, e.g.:
#         kubectl create secret generic anthropic-claude-auth \
#             --from-literal=CLAUDE_CODE_OAUTH_TOKEN='<paste-token-here>'
#
# The deployment loads CLAUDE_CODE_OAUTH_TOKEN as an env var on the sidecar
# container. Treat the token like a password. Refresh annually before
# expiry. See docs/operations.md for the full identity model and the
# alternative ~/.claude.json file-mount flow.
stringData:
  CLAUDE_CODE_OAUTH_TOKEN: "REPLACE_ME"
