apiVersion: v1
kind: Secret
metadata:
  name: sidecar-secret
type: Opaque
stringData:
  bearer: "REPLACE_ME"
---
# ── PROVIDER=claude ───────────────────────────────────────────────────────────
# Production / general use: pay-as-you-go API key from the Anthropic Console.
#   kubectl create secret generic anthropic-claude-auth \
#       --from-literal=ANTHROPIC_API_KEY='sk-ant-...'
#
# NOTE: the subscription OAuth token (`claude setup-token` →
# CLAUDE_CODE_OAUTH_TOKEN) is for LOCAL TESTING ONLY — never put it in a
# cluster Secret. See docs/operations.md#identity-model-1x.
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-claude-auth
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_ME"
---
# ── PROVIDER=codex (Option A: API key) ───────────────────────────────────────
# Simplest option for k8s. Pay-as-you-go; no subscription file needed.
#   kubectl create secret generic openai-codex-auth \
#       --from-literal=OPENAI_API_KEY='sk-...'
apiVersion: v1
kind: Secret
metadata:
  name: openai-codex-auth
type: Opaque
stringData:
  OPENAI_API_KEY: "REPLACE_ME"
---
# ── PROVIDER=codex (Option B: OAuth subscription — file mount) ────────────────
# Use your ChatGPT Plus/Pro subscription credit instead of API tokens.
# Codex has no single-token env var like Claude's CLAUDE_CODE_OAUTH_TOKEN;
# the full auth state must be mounted as a file.
#
# One-time setup (on a machine with a browser + active ChatGPT subscription):
#   npm install -g @openai/codex
#   codex login                          # completes browser OAuth
#   kubectl create secret generic openai-codex-oauth \
#       --from-file=auth.json=$HOME/.codex/auth.json
#
# The deployment mounts this at /root/.codex/auth.json inside the container.
# Refresh when the OAuth session expires (cadence depends on OpenAI's token TTL).
apiVersion: v1
kind: Secret
metadata:
  name: openai-codex-oauth
type: Opaque
stringData:
  auth.json: |
    REPLACE_ME_with_contents_of_~/.codex/auth.json
