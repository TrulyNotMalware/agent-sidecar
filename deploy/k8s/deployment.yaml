apiVersion: apps/v1
kind: Deployment
metadata:
  name: example-app-with-claude-sidecar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: example-app
  template:
    metadata:
      labels:
        app: example-app
    spec:
      initContainers:
        # k8s 1.28+ native sidecar via restartPolicy=Always on an initContainer.
        #
        # ── PROVIDER=claude (default) ─────────────────────────────────────────
        # Uses ANTHROPIC_API_KEY from the anthropic-claude-auth Secret.
        # Switch to PROVIDER=codex by replacing the auth env/volume below;
        # see the commented codex blocks at the bottom of this file.
        - name: claude-sidecar
          image: ghcr.io/REPLACE_ORG/claude-sidecar:1.0.0
          restartPolicy: Always
          ports:
            - containerPort: 7300
          env:
            - name: PROVIDER
              value: "claude"          # switch to "codex" for the Codex backend
            - name: BEARER_SECRET
              valueFrom:
                secretKeyRef:
                  name: sidecar-secret
                  key: bearer
            # ── Claude auth ──────────────────────────────────────────────────
            # Production / general use: API key only. The subscription OAuth
            # token (CLAUDE_CODE_OAUTH_TOKEN) is for LOCAL TESTING ONLY and
            # must never be deployed to a cluster.
            - name: ANTHROPIC_MODE
              value: "api"           # makes /readyz require the API key
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: anthropic-claude-auth
                  key: ANTHROPIC_API_KEY
            # ── Codex auth Option A: API key (uncomment when PROVIDER=codex) ─
            # - name: OPENAI_API_KEY
            #   valueFrom:
            #     secretKeyRef:
            #       name: openai-codex-auth
            #       key: OPENAI_API_KEY
            - name: MAX_CONCURRENT
              value: "8"
            - name: TURN_TIMEOUT_SEC
              value: "90"
            - name: BIND
              value: "127.0.0.1"
          volumeMounts:
            - { name: mcp-config,  mountPath: /etc/sidecar,     readOnly: true }
            - { name: claude-md,   mountPath: /workspace,       readOnly: true }
            - { name: sessions,    mountPath: /var/lib/claude-sidecar/sessions }
            # ── Codex auth Option B: OAuth file mount (uncomment when PROVIDER=codex) ─
            # - name: codex-oauth
            #   mountPath: /root/.codex
            #   readOnly: true
          readinessProbe:
            httpGet: { path: /readyz, port: 7300 }
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 7300 }
            initialDelaySeconds: 10
            periodSeconds: 15
      containers:
        - name: app
          image: ghcr.io/REPLACE_ORG/example-app:latest
          # The app talks to the sidecar over localhost:7300.
          env:
            - name: SIDECAR_URL
              value: "http://127.0.0.1:7300"
      volumes:
        - name: mcp-config
          configMap:
            name: app-mcp-config
        - name: claude-md
          configMap:
            name: app-claude-md
        - name: sessions
          emptyDir: {}
        # ── Codex OAuth file mount volume (uncomment when PROVIDER=codex, Option B) ─
        # - name: codex-oauth
        #   secret:
        #     secretName: openai-codex-oauth
        #     items:
        #       - key: auth.json
        #         path: auth.json
